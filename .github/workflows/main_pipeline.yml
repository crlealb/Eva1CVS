name: Reusable Build and Push to ECR Template

on:
  workflow_call:
    inputs:
      aws-region:
        description: 'Región de AWS (ej. us-east-1)'
        required: true
        type: string
      ecr-repository:
        description: 'Nombre del repositorio en ECR (ej. techmarket-repo)'
        required: true
        type: string
      image-tag:
        description: 'Etiqueta de la versión (ej. v1.0.0)'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_SESSION_TOKEN:
        required: false

jobs:
  build-and-push-ecr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Acción externa clave: Autenticación con AWS
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.aws-region }}

      # Acción externa: Iniciar sesión en ECR
      - name: Login en Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Construir, etiquetar y subir la imagen
      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ inputs.ecr-repository }}
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          # Construimos la imagen localmente
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          # La subimos al registro de ECR
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
