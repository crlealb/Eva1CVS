name: TechMarket Main CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    uses: ./.github/workflows/templates/template_build.yml
    with:
      aws-region: 'us-east-1'
      ecr-repository: 'techmarket-repo'
      image-tag: 'v1.0.0'
      app-color: 'Blue'
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

  test:
    needs: build
    uses: ./.github/workflows/templates/template_test.yml
    with:
      # AQUÍ ESTÁ LA MAGIA: Reutilizamos el output generado en el paso anterior
      image-to-scan: ${{ needs.build.outputs.imagen-generada }}
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

  deploy_dev:
    needs: test
    uses: ./.github/workflows/templates/template_deploy.yml
    with:
      environment: 'dev'
      aws-region: 'us-east-1'
      image-uri: ${{ needs.build.outputs.imagen-generada }}
      app-port: '8080'
    secrets:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
      EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      # Pasamos el secreto limpio, sin concatenar texto
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
