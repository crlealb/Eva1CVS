name: Reusable Build Template

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Nombre de la imagen Docker (ej. mi-usuario/techmarket)'
        required: true
        type: string
      image-tag:
        description: 'Etiqueta de la versión (ej. v1.0.0)'
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # Acción externa 1: Traer el código [cite: 37]
      - name: Checkout del código
        uses: actions/checkout@v4

      # Acción externa 2: Autenticación en Docker Hub
      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Acción externa 3: Construir y subir la imagen
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ inputs.image-name }}:${{ inputs.image-tag }}
